<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function add7(number) {
            return number + 7;
        }
        function multiply(no1, no2) {
            return no1 * no2;
        }
        function capitalize(text) {
            let lowText = text.toLowerCase();
            let firstLetter = lowText.slice(0, 1);
            return firstLetter.toUpperCase() + lowText.slice(1);
        }
        function lastLetter(s) {
            return s.slice(-1);
        }
    </script>
</body>

</html>
